name: IsaacLab Arena CI

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Concurrency control to prevent parallel runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read

env:
  NGC_API_KEY: ${{ secrets.ARENA_NGC_API_KEY }}
  OMNI_PASS: ${{ secrets.OMNI_PASS }}
  OMNI_USER: ${{ secrets.OMNI_USER }}


jobs:

  pre_commit:
    name: Pre-commit
    runs-on: [self-hosted, gpu-arena]
    timeout-minutes: 30

    container:
      image: python:3.11-slim

    env:
      # We're getting issues with the markers on the checked out files.
      SKIP: check-executables-have-shebangs

    steps:
      - &install_git_step
        name: Install git (and tools needed by hooks)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git git-lfs clang-format ca-certificates make
          git --version
          git lfs version

      # Clean up residual stuff due to symlinks in the submodules directory
      # We do this prior to checkout because the symlink causes issues if it's there from a previous run.
      - &cleanup_step
        name: Clean up symlinks in submodules directory
        run: |
          rm -f .git/modules/submodules/IsaacLab/index.lock || true
          rm -rf submodules/* || true

      # Fix "detected dubious ownership in repository" inside containers
      - &mark_repo_safe_step
        name: Mark repo as safe for git
        run: git config --global --add safe.directory "$PWD"

      # Checkout Code
      - &checkout_step
        name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          # LFS checkout here somehow causes issues when LFS stuff changes over time.
          # So I do LFS manually in a step after.
          # lfs: true

      # Pull LFS files explicitly (in case checkout didn't get them all)
      - &git_lfs_step
        name: Git LFS
        run: |
          git lfs update --force
          git lfs install --local
          git lfs pull

      - name: git status
        run: |
          git status

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --verbose
        env:
          # Avoid "dubious ownership" errors on restored cache dirs — use a
          # fresh directory owned by the current process instead.
          PRE_COMMIT_HOME: /tmp/pre-commit-cache

  test:
    name: Run tests
    runs-on: [self-hosted, gpu-arena]
    timeout-minutes: 80
    needs: [pre_commit]

    container:
      image: nvcr.io/nvstaging/isaac-amr/isaaclab_arena:latest
      credentials:
        username: $oauthtoken
        password: ${{ env.NGC_API_KEY }}

    steps:
      # nvidia-smi
      - &nvidia_smi
        name: nvidia-smi
        run: nvidia-smi

      - &lscpu
        name: lscpu
        run: lscpu

      # Setup
      - *install_git_step
      - *cleanup_step
      - *mark_repo_safe_step
      - *checkout_step
      - *git_lfs_step

      - &install_project_step
        name: Install project and link isaac-sim
        run: |
          /isaac-sim/python.sh -m pip install --no-cache-dir -e .
          [ -e ./submodules/IsaacLab/_isaac_sim ] || ln -s /isaac-sim ./submodules/IsaacLab/_isaac_sim

      - &setup_isaac_sim_kit_cache_step
        name: Setup Isaac Sim kit cache (shader warmup on miss)
        uses: ./.github/actions/setup-isaac-sim-kit-cache

      # Run the tests.
      #
      # Note(alexmillane): We have to run the tests in a specific way. To achieve a reasonable test speed,
      # we don't close the SimulationApp between tests, where this is possible. We need, however, to restart the
      # SimulationApp between tests that require cameras/rendering and those that don't. To make
      # matters more complicated, since Isaac Sim 6.0, this persistent SimulationApp scheme is also not
      # mixing well with subprocess-spawning tests. We get intermittent hangs if a subprocess-spawning
      # test is run while a persistent SimulationApp is still open. For that reason we also need to
      # separate those test that spawn subprocess. So in the end, we run
      #
      # - All tests not requiring cameras in a shared SimulationApp.
      # - All tests requiring cameras in a shared SimulationApp.
      # - All subprocess-spawning tests (each spawns their own SimulationApp)
      #
      # To restore sanity here is a goal for Isaac Lab Arena v0.3.
      # - name: Run in-process Newton tests
      #   run: |
      #     /isaac-sim/python.sh -m pytest -sv --durations=0 -m with_newton \
      #       isaaclab_arena/tests/

      # - name: Run in-process PhysX tests without cameras
      #   run: |
      #     /isaac-sim/python.sh -m pytest -sv --durations=0 -m "not with_cameras and not with_subprocess and not with_newton" \
      #       isaaclab_arena/tests/

      # - name: Run GR00T policy/data tests (lightweight gr00t deps only)
      #   run: |
      #     /isaac-sim/python.sh -m pytest -sv --durations=0 -m gr00t_policy \
      #       isaaclab_arena_gr00t/tests/


  test_gr00t_closedloop_e2e:
    name: GR00T closed-loop E2E (sidecar)
    runs-on: [self-hosted, gpu-arena]
    timeout-minutes: 90
    needs: [pre_commit]

    container:
      image: nvcr.io/nvstaging/isaac-amr/isaaclab_arena:latest
      credentials:
        username: $oauthtoken
        password: ${{ env.NGC_API_KEY }}
      options: --gpus all

    services:
      gr00t:
        image: nvcr.io/nvidian/gr00t1_6_arena_ci:latest
        credentials:
          username: $oauthtoken
          password: ${{ env.NGC_API_KEY }}
        ports:
          - 5555:5555
        # Mount the runner's workspace into the gr00t container; the baked
        # /workspace/ci_bootstrap.sh polls until checkout writes the wrapper
        # script, then execs it. See .github/scripts/ci_gr00t_bootstrap.sh.
        volumes:
          - ${{ github.workspace }}:/arena_workspace
        options: >-
          --gpus all
          --entrypoint /workspace/ci_bootstrap.sh

    steps:
      - *nvidia_smi
      - *lscpu
      - *install_git_step
      - *cleanup_step
      - *mark_repo_safe_step
      - *checkout_step
      - *git_lfs_step
      - *install_project_step
      - *setup_isaac_sim_kit_cache_step

      # The gr00t sidecar takes ~10-30 min to finetune+load. Poll the ZMQ
      # endpoint with the real PolicyClient — TCP-open isn't sufficient
      # because the socket binds before the model finishes loading.
      - name: Wait for GR00T server
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # -u is belt-and-suspenders alongside PYTHONUNBUFFERED so prints
          # land in the log even if the step is killed mid-flight.
          /isaac-sim/python.sh -u - <<'PY'
          import socket, sys, time, zmq
          from gr00t.policy.server_client import MsgSerializer

          HOST, PORT = "gr00t", 5555
          POLL_INTERVAL_S = 15
          MAX_ITERS = 40  # 40 * 15s = 10 min
          REQ_TIMEOUT_MS = 5000

          def dns_probe():
              try:
                  return f"resolved -> {socket.gethostbyname_ex(HOST)}"
              except Exception as e:
                  return f"FAILED: {type(e).__name__}: {e}"

          def tcp_probe():
              try:
                  with socket.create_connection((HOST, PORT), timeout=3) as s:
                      return f"OK ({s.getpeername()})"
              except Exception as e:
                  return f"FAILED: {type(e).__name__}: {e}"

          def ping():
              # PolicyClient takes a timeout_ms ctor arg but never applies it
              # to the socket — recv() would block forever if the server isn't
              # responding. Use ZMQ directly with explicit RCVTIMEO/SNDTIMEO,
              # and a fresh socket per attempt so a timeout doesn't leave the
              # REQ-REP state machine wedged.
              ctx = zmq.Context.instance()
              sock = ctx.socket(zmq.REQ)
              sock.setsockopt(zmq.LINGER, 0)
              sock.setsockopt(zmq.RCVTIMEO, REQ_TIMEOUT_MS)
              sock.setsockopt(zmq.SNDTIMEO, REQ_TIMEOUT_MS)
              try:
                  sock.connect(f"tcp://{HOST}:{PORT}")
                  sock.send(MsgSerializer.to_bytes({"endpoint": "ping"}))
                  return True, MsgSerializer.from_bytes(sock.recv())
              except Exception as e:
                  return False, f"{type(e).__name__}: {e}"
              finally:
                  sock.close()

          print(f"[init] DNS  {HOST}: {dns_probe()}", flush=True)
          print(f"[init] TCP  {HOST}:{PORT}: {tcp_probe()}", flush=True)

          for i in range(MAX_ITERS):
              elapsed = i * POLL_INTERVAL_S
              ok, detail = ping()
              if ok:
                  print(f"[t={elapsed}s] GR00T server ready (ping={detail})", flush=True)
                  sys.exit(0)
              extra = f" tcp_probe={tcp_probe()}" if i % 4 == 0 else ""
              print(f"[t={elapsed}s] not ready: {detail}{extra}", flush=True)
              time.sleep(POLL_INTERVAL_S)

          print("---- final diagnostics ----", flush=True)
          print(f"DNS  {HOST}: {dns_probe()}", flush=True)
          print(f"TCP  {HOST}:{PORT}: {tcp_probe()}", flush=True)
          sys.exit("timed out waiting for GR00T server")
          PY

      - name: Run closed-loop eval against GR00T sidecar
        run: |
          # The remote Arena policy only uses this YAML for obs/action translation;
          # the actual model was trained and loaded by the GR00T sidecar. Replace
          # the tutorial checkpoint path with a valid HF-style id so config
          # validation does not require /models to exist in the job container.
          CI_POLICY_CONFIG=/tmp/g1_locomanip_ci_gr00t_closedloop_config.yaml
          cp isaaclab_arena_gr00t/policy/config/g1_locomanip_gr00t_closedloop_config.yaml "$CI_POLICY_CONFIG"
          sed -i 's#^model_path:.*#model_path: nvidia/GR00T-N1.6-3B#' "$CI_POLICY_CONFIG"

          /isaac-sim/python.sh isaaclab_arena/evaluation/policy_runner.py \
            --policy_type isaaclab_arena_gr00t.policy.gr00t_remote_closedloop_policy.Gr00tRemoteClosedloopPolicy \
            --policy_config_yaml_path "$CI_POLICY_CONFIG" \
            --remote_host gr00t \
            --remote_port 5555 \
            --num_steps 17 \
            --num_envs 1 \
            --headless \
            --enable_cameras \
            galileo_g1_locomanip_pick_and_place \
            --object brown_box \
            --embodiment g1_wbc_joint


  build_docs_pre_merge:
    name: Build the docs (pre-merge)
    runs-on: [self-hosted, gpu-arena]
    timeout-minutes: 30
    needs: [pre_commit]

    container:
      image: python:3.11-slim

    steps:
      # Setup.
      - *install_git_step
      - *mark_repo_safe_step
      - *cleanup_step

      - name: Checkout Code
        uses: actions/checkout@v4

      # Build docs for the current branch (validates PR changes)
      - name: Build docs
        working-directory: ./docs
        run: |
          pip3 install -r requirements.txt
          make SPHINXOPTS=-W html


  build_and_push_image_post_merge:
    name: Build & push NGC image (post-merge)
    runs-on: [self-hosted, gpu-arena]
    timeout-minutes: 90
    needs: [test]       # only push if tests passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    container:
      image: ubuntu:latest

    env:
      # already defined at top, but keep here for clarity/local override if needed
      NGC_API_KEY: ${{ secrets.ARENA_NGC_API_KEY }}

    steps:
      # Setup.
      - *install_git_step
      - *mark_repo_safe_step
      - *cleanup_step
      - *checkout_step

      - name: Install docker
        run: |
          apt-get update
          apt-get install -y ca-certificates curl gnupg && \
          install -m 0755 -d /etc/apt/keyrings && \
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg && \
          chmod a+r /etc/apt/keyrings/docker.gpg && \
          echo "deb [arch="$(dpkg --print-architecture)" signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
          "$(. /etc/os-release && echo "$VERSION_CODENAME")" stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null &&
          apt-get update && apt-get install -y docker.io docker-buildx-plugin
          docker --version

      - name: Docker login to NGC
        # $oauthtoken is the literal NGC username; pipe the NGC API key via stdin
        run: echo "${NGC_API_KEY}" | docker login nvcr.io -u '$oauthtoken' --password-stdin

      - name: Build & push image to NGC
        run: |
          chmod +x ./docker/push_to_ngc* || true
          ./docker/push_to_ngc.sh -p

      - name: Build & push image to NGC (GR00T Image)
        run: |
          chmod +x ./docker/push_to_ngc* || true
          ./docker/push_to_ngc.sh -p -g -t cuda_gr00t_gn16
