defaults:
  - arena_experiment_submission_schema
  - server_config: null
  - experiment_definition: null
  - override hydra/job_logging: disabled
  - _self_

hydra:
  help:
    header: |
      Submit a typed Arena Experiment as an OSMO workflow.

      Experiment Definitions must be direct .yaml or .yml files in:
        isaaclab_arena_environments/experiment_configs/

      Select one by filename stem:
        experiment_definition=<name>
      For example, experiment_definition=openpi_experiment selects:
        isaaclab_arena_environments/experiment_configs/openpi_experiment.yaml

      Arbitrary Experiment Definition paths are not supported. Available names
      are listed under experiment_definition below.

  run:
    dir: .
  output_subdir: null
