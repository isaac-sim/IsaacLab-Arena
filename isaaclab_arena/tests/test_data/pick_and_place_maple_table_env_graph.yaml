env_name: pick_and_place_maple_table_default
embodiment:
  id: droid_abs_joint_pos
  registry_name: droid_abs_joint_pos
  params: {}
background:
  id: maple_table_robolab
  registry_name: maple_table_robolab
  params: {}
objects:
- id: rubiks_cube_hot3d_robolab
  registry_name: rubiks_cube_hot3d_robolab
  params: {}
- id: bowl_ycb_robolab
  registry_name: bowl_ycb_robolab
  params: {}
- id: mug_ycb_robolab
  registry_name: mug_ycb_robolab
  params: {}
object_references:
- id: maple_table_robolab_table
  parent_id: maple_table_robolab
  prim_path: '{ENV_REGEX_NS}/maple_table_robolab/table'
  object_type: rigid
  params: {}
relations:
- kind: is_anchor
  subject: maple_table_robolab_table
  reference: null
  params: {}
- kind: 'on'
  subject: rubiks_cube_hot3d_robolab
  reference: maple_table_robolab_table
  params: {}
- kind: position_limits
  subject: rubiks_cube_hot3d_robolab
  reference: null
  params:
    x_min: 0.55
    x_max: 0.7
    y_min: -0.4
    y_max: -0.1
- kind: 'on'
  subject: bowl_ycb_robolab
  reference: maple_table_robolab_table
  params: {}
- kind: position_limits
  subject: bowl_ycb_robolab
  reference: null
  params:
    x_min: 0.55
    x_max: 0.7
    y_min: -0.4
    y_max: -0.1
- kind: at_position
  subject: mug_ycb_robolab
  reference: null
  params:
    x: 0.65
    y: 0.25
    z: 0.85
cli_override_specs:
- arg: embodiment
  target_node_id: droid_abs_joint_pos
- arg: object
  target_node_id: rubiks_cube_hot3d_robolab
task:
  composition: sequential
  description: pick up the rubiks cube and place it in the bowl ; pick up the mug
    and place it in the bowl
  subtasks:
  - kind: PickAndPlaceTask
    params:
      pick_up_object: rubiks_cube_hot3d_robolab
      destination_location: bowl_ycb_robolab
      background_scene: maple_table_robolab
      episode_length_s: 20.0
  - kind: PickAndPlaceTask
    params:
      pick_up_object: mug_ycb_robolab
      destination_location: bowl_ycb_robolab
      background_scene: maple_table_robolab
      episode_length_s: 20.0
