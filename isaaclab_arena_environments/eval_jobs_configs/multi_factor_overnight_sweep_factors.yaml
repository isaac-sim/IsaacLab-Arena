# Sensitivity-analysis schema for the multi-factor overnight pick-and-place sweep
# on droid + pi0. Paired with: multi_factor_overnight_sweep_jobs_config.json
# (1000 jobs × num_envs=4 = ~4000 expected episodes).
#
# Sampling distribution: ``light_intensity`` was drawn LOG-uniformly across [0.01, 5000]
# (5.7 decades, equal density per decade). The analyzer in ``dataset.py`` honors the
# ``distribution: log_uniform`` declaration below by transforming theta to log10 space at
# load time and building a matching BoxUniform prior in log space.

slice:
  policy: pi0_remote
  task: pick_and_place_maple_table
  embodiment: droid_abs_joint_pos

factors:
  light_intensity:
    type: continuous
    dim: 1
    # Spans 5.7 decades from effectively-pitch-black to bright, sampled LOG-uniformly
    # so each decade gets equal density. Lower bound at 0.01 (rather than 0) because
    # log(0) is undefined; 0.01 is so far below pi0's failure threshold (~10) that
    # camera frames are pixel-black there — practical equivalent of "dark."
    range: [[0.01, 5000]]
    distribution: log_uniform
  pick_up_object:
    type: categorical
    # Same five Robolab assets used in the synthetic categorical generator. Spans
    # easy (cube), medium (can, box, mug), to hard (bowl-into-bowl is awkward for pi0).
    # Per-job language_instruction in the jobs config describes the specific object so
    # pi0 conditions on the right thing.
    choices:
      - rubiks_cube_hot3d_robolab
      - alphabet_soup_can_hope_robolab
      - sugar_box_ycb_robolab
      - mug_ycb_robolab
      - wooden_bowl_hot3d_robolab

outcomes:
  success_rate:
    # Per-episode value of SuccessRateMetric. Returns 0.0 or 1.0 for a single demo.
    type: float
  object_moved_rate:
    # Per-episode value of ObjectMovedRateMetric. Same shape as success_rate.
    type: float
  task_duration:
    # Per-episode wall-clock-equivalent seconds before termination, computed in
    # episode_writer as demo_step_count * env.step_dt. Continuous; informative even
    # within all-success episodes (fast successes != slow successes near the edges).
    type: float
