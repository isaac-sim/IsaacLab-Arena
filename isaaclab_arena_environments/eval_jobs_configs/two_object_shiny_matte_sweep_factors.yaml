# Sensitivity-analysis schema for the focused two-object shiny-vs-matte sweep on
# droid + pi0. Paired with: two_object_shiny_matte_sweep_jobs_config.json
# (1000 jobs = 500 rubiks_cube + 500 alphabet_soup_can, x num_envs=2 x
# num_episodes=2 = up to 4000 expected episodes).
#
# Hypothesis: surface reflectance interacts with lighting in pi0's competence curve.
# This run pairs the Rubik's cube (matte plastic body with glossy stickers — less
# specular overall) against the metal soup can (more specular) and samples both
# densely across the light range. NOTE: rubiks_cube replaced the mustard bottle
# because mustard failed to build repeatedly in the eval_runner path (contact-sensor
# `descendants=0`); rubiks_cube is proven-reliable (281 episodes in the prior
# 5-object sweep). The matte/shiny contrast is therefore weaker than intended.
#
# Sampling distribution: ``light_intensity`` drawn LOG-uniformly across [0.01, 5000]
# (5.7 decades, equal density per decade), same as the prior sweep so the two runs
# are directly comparable. The analyzer honors ``distribution: log_uniform`` by
# transforming theta to log10 space and building a matching BoxUniform prior there.

slice:
  policy: pi0_remote
  task: pick_and_place_maple_table
  embodiment: droid_abs_joint_pos

factors:
  light_intensity:
    type: continuous
    dim: 1
    range: [[0.01, 5000]]
    distribution: log_uniform
  pick_up_object:
    type: categorical
    # Two objects chosen for contrasting surface reflectance:
    #   rubiks_cube       — matte plastic body + glossy stickers (less specular), proven-reliable
    #   alphabet_soup_can — metal can w/ label, more specular/SHINY
    choices:
      - rubiks_cube_hot3d_robolab
      - alphabet_soup_can_hope_robolab

outcomes:
  success_rate:
    type: float
  object_moved_rate:
    type: float
  task_duration:
    type: float
