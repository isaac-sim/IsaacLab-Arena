# Sensitivity-analysis schema for the focused two-object shiny-vs-matte sweep on
# droid + pi0. Paired with: two_object_shiny_matte_sweep_jobs_config.json
# (300 jobs x num_envs=2 x num_episodes=2 = ~600 expected episodes).
#
# Hypothesis: a reflective (shiny) object and a diffuse (matte) object should have
# different competence-vs-light curves. The prior 5-object run hinted at this (the
# matte wooden bowl peaked at low light, the more-specular soup can at high light);
# this run pairs a plastic mustard bottle (semi-matte, easy compact grasp) against
# the metal soup can (specular) and samples both densely across the light range.
#
# Sampling distribution: ``light_intensity`` drawn LOG-uniformly across [0.01, 5000]
# (5.7 decades, equal density per decade), same as the prior sweep so the two runs
# are directly comparable. The analyzer honors ``distribution: log_uniform`` by
# transforming theta to log10 space and building a matching BoxUniform prior there.

slice:
  policy: pi0_remote
  task: pick_and_place_maple_table
  embodiment: droid_abs_joint_pos

factors:
  light_intensity:
    type: continuous
    dim: 1
    range: [[0.01, 5000]]
    distribution: log_uniform
  pick_up_object:
    type: categorical
    # Two objects chosen for contrasting surface reflectance:
    #   mustard           — plastic bottle, semi-diffuse/MATTE-ish, easy compact grasp
    #   alphabet_soup_can — metal can w/ label, more specular/SHINY
    choices:
      - mustard_ycb_robolab
      - alphabet_soup_can_hope_robolab

outcomes:
  success_rate:
    type: float
  object_moved_rate:
    type: float
  task_duration:
    type: float
