# Sensitivity-analysis schema for the light_intensity sweep on droid + pi0.
# Paired with: light_intensity_sweep_jobs_config.json (and the minimal variant).
# Hand-authored — the factor names here must match keys in the eval's arena_env_args.
#
# - slice identifies the (policy, task, embodiment) the dataset comes from; MNPE/NPE
#   assumes a single data-generating source per analysis.
# - factors declares what the eval varies; the eval writer logs the full arena_env_args
#   per episode (--episode_summary) and the analyzer treats these keys as factors.
# - outcomes declares what the eval measures; the writer pulls these from the
#   registered task metrics (compute_metric_from_recording on each demo).

slice:
  policy: pi0_remote
  task: pick_and_place_maple_table
  embodiment: droid_abs_joint_pos

factors:
  light_intensity:
    type: continuous
    dim: 1
    # Mirrors the robolab evaluated endpoints [10, 5000] for direct comparison; spans the
    # dark / normal / bright regimes around the policy's trained operating point (~500).
    range: [[10, 5000]]

outcomes:
  success_rate:
    # Per-episode value of SuccessRateMetric. Returns 0.0 or 1.0 for a single demo.
    type: float
  object_moved_rate:
    # Per-episode value of ObjectMovedRateMetric. Same shape as success_rate.
    type: float
