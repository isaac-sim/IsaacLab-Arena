env_name: two_bin
embodiment:
  id: droid
  registry_name: droid_abs_joint_pos
  params: {}
background:
  id: maple_table_robolab
  registry_name: maple_table_robolab
  params: {}
objects:
- id: grey_bin_left
  registry_name: grey_bin_robolab
  params: {}
- id: grey_bin_right
  registry_name: grey_bin_robolab
  params: {}
- id: mustard
  registry_name: mustard_bottle_hope_robolab
  params: {}
relations:
- kind: is_anchor
  subject: maple_table_robolab
  reference: null
  params: {}
- kind: 'on'
  subject: grey_bin_left
  reference: maple_table_robolab
  params: {}
- kind: 'on'
  subject: grey_bin_right
  reference: maple_table_robolab
  params: {}
- kind: 'on'
  subject: mustard
  reference: maple_table_robolab
  params: {}
- kind: next_to
  subject: grey_bin_left
  reference: grey_bin_right
  params:
    side: positive_y
    distance_m: 0.3
task:
  composition: atomic
  description: put the mustard in the left bin
  subtasks:
  - kind: PickAndPlaceTask
    params:
      pick_up_object: mustard
      destination_location: grey_bin_left
      background_scene: maple_table_robolab
      episode_length_s: 20.0
      max_separation:
      - 0.1
      - 0.1
      - 0.1
