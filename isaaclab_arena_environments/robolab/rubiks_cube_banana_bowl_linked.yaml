env_name: rubiks_cube_banana_bowl
embodiment:
  id: droid
  registry_name: droid_abs_joint_pos
  params: {}
background:
  id: maple_table_robolab
  registry_name: maple_table_robolab
  params: {}
objects:
- id: banana
  registry_name: banana_ycb_robolab
  params: {}
- id: cube
  registry_name: dex_cube
  params: {}
- id: bowl
  registry_name: bowl_ycb_robolab
  params: {}
relations:
- kind: is_anchor
  subject: maple_table_robolab
  reference: null
  params: {}
- kind: 'on'
  subject: bowl
  reference: maple_table_robolab
  params: {}
- kind: 'on'
  subject: banana
  reference: maple_table_robolab
  params: {}
- kind: 'on'
  subject: cube
  reference: maple_table_robolab
  params: {}
task:
  composition: sequential
  description: pick up the banana and place it in the bowl ; pick up the cube and
    place it in the bowl
  subtasks:
  - kind: PickAndPlaceTask
    params:
      pick_up_object: banana
      destination_location: bowl
      background_scene: maple_table_robolab
      episode_length_s: 20.0
  - kind: PickAndPlaceTask
    params:
      pick_up_object: cube
      destination_location: bowl
      background_scene: maple_table_robolab
      episode_length_s: 20.0
