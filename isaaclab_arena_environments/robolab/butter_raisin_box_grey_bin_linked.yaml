env_name: butter_raisin_box_grey_bin
embodiment:
  id: droid
  registry_name: droid_abs_joint_pos
  params: {}
background:
  id: maple_table_robolab
  registry_name: maple_table_robolab
  params: {}
objects:
- id: raisin_box
  registry_name: raisin_box_hope_robolab
  params: {}
- id: grey_bin
  registry_name: grey_bin_robolab
  params: {}
- id: butter
  registry_name: butter_hope_robolab
  params: {}
relations:
- kind: is_anchor
  subject: maple_table_robolab
  reference: null
  params: {}
- kind: 'on'
  subject: grey_bin
  reference: maple_table_robolab
  params: {}
- kind: 'on'
  subject: raisin_box
  reference: maple_table_robolab
  params: {}
- kind: 'on'
  subject: butter
  reference: maple_table_robolab
  params: {}
- kind: rotate_around_solution
  subject: raisin_box
  reference: null
  params:
    pitch_rad: 90.0
- kind: rotate_around_solution
  subject: butter
  reference: null
  params:
    pitch_rad: 90.0
task:
  composition: atomic
  description: Pick up the red raisin box and place it into the grey bin on the maple
    table.
  subtasks:
  - kind: PickAndPlaceTask
    params:
      pick_up_object: raisin_box
      destination_location: grey_bin
      background_scene: maple_table_robolab
      max_separation:
      - 0.1
      - 0.1
      - 0.1
      episode_length_s: 20.0
