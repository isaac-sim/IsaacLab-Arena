runs:
- name: gr1_open_microwave_cracker_box
  environment:
    type: gr1_open_microwave
    object: cracker_box
    embodiment: gr1_joint
  policy:
    type: zero_action
  rollout_limit:
    num_steps: 10

- name: gr1_open_microwave_sugar_box
  environment:
    type: gr1_open_microwave
    object: sugar_box
    embodiment: gr1_pink
  policy:
    type: zero_action
  environment_builder:
    num_envs: 10
  rollout_limit:
    num_steps: 10
