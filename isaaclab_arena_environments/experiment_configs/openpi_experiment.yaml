# One Arena Experiment with one Run backed by a co-scheduled OpenPI server.
runs:
- name: openpi_maple_table
  environment:
    type: pick_and_place_maple_table
    enable_cameras: true
    embodiment: droid_abs_joint_pos
    pick_up_object: rubiks_cube_hot3d_robolab
    destination_location: bowl_ycb_robolab
    hdr: home_office_robolab
  policy:
    type: pi0_remote
    policy_variant: pi05
    ping_timeout: 300.0
  rollout_limit:
    num_episodes: 1
