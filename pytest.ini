[pytest]
markers =
    with_cameras: test requires enable_cameras=True
    with_subprocess: test spawns Isaac Sim as a child process (must not share a session with persistent SimApp tests)
    with_newton: test uses Newton physics
    gr00t_policy: test exercises GR00T policy/data code that runs in the base container (lightweight gr00t deps only)
    gr00t_remote_e2e: test requires a live GR00T remote policy server
    curobo_deps: cuRobo image test — deps presence and IK reachability (runs only in the cuRobo image, built with ./docker/run_docker.sh -c)
