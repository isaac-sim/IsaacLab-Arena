# Joint ordering for ONNX model inputs (29 body joints in agile order).
# Must match the element_names from unitree_g1_velocity_e2e.yaml.
onnx_input_joint_names:
  - left_hip_pitch_joint
  - right_hip_pitch_joint
  - waist_yaw_joint
  - left_hip_roll_joint
  - right_hip_roll_joint
  - waist_roll_joint
  - left_hip_yaw_joint
  - right_hip_yaw_joint
  - waist_pitch_joint
  - left_knee_joint
  - right_knee_joint
  - left_shoulder_pitch_joint
  - right_shoulder_pitch_joint
  - left_ankle_pitch_joint
  - right_ankle_pitch_joint
  - left_shoulder_roll_joint
  - right_shoulder_roll_joint
  - left_ankle_roll_joint
  - right_ankle_roll_joint
  - left_shoulder_yaw_joint
  - right_shoulder_yaw_joint
  - left_elbow_joint
  - right_elbow_joint
  - left_wrist_roll_joint
  - right_wrist_roll_joint
  - left_wrist_pitch_joint
  - right_wrist_pitch_joint
  - left_wrist_yaw_joint
  - right_wrist_yaw_joint

# Joint ordering for ONNX model outputs (14 controlled joints in agile output order).
# Must match the action_joint_pos element_names from unitree_g1_velocity_e2e.yaml.
controlled_joint_names:
  - left_hip_pitch_joint
  - right_hip_pitch_joint
  - left_hip_roll_joint
  - right_hip_roll_joint
  - waist_roll_joint
  - left_hip_yaw_joint
  - right_hip_yaw_joint
  - waist_pitch_joint
  - left_knee_joint
  - right_knee_joint
  - left_ankle_pitch_joint
  - right_ankle_pitch_joint
  - left_ankle_roll_joint
  - right_ankle_roll_joint

num_actions: 14
num_body_joints: 29

# Initial commands
cmd_init: [0.0, 0.0, 0.0]
