env_name: droid_kitchen_placement_only
embodiment:
  id: droid
  registry_name: droid_abs_joint_pos
  params:
    stand_height: 1.1
background:
  id: kitchen
  registry_name: lightwheel_robocasa_kitchen
  params: {}
objects: []
object_references:
- id: right_counter_top
  parent_id: kitchen
  prim_path: counter_right_main_group/top_geometry
  object_type: base
  params: {}
- id: floor
  parent_id: kitchen
  prim_path: floor_room/geometry
  object_type: base
  params: {}
relations:
- kind: is_anchor
  subject: floor
  params: {}
- kind: is_anchor
  subject: right_counter_top
  params: {}
- kind: 'on'
  subject: droid
  reference: floor
  params: {}
- kind: next_to
  subject: droid
  reference: right_counter_top
  params:
    side: negative_y
    distance_m: 0.01
- kind: rotate_around_solution
  subject: droid
  params:
    yaw_rad: 1.57
task:
  composition: atomic
  description: robot placement only
  subtasks:
  - kind: NoTask
    params: {}
