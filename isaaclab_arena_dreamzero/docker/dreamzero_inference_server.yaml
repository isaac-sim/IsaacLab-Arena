workflow:
  name: dreamzero-inference-server
  # H100 only: the 16B-parameter model runs in float32 (~65 GiB per GPU replica).
  # Each rank holds a full model copy (data parallelism, not tensor parallelism),
  # so per-GPU memory is the same regardless of how many GPUs are used.
  # H100 (80 GiB) fits; L40 (48 GiB) OOMs even with 4+ GPUs.
  pool: isaac-dev-h100-01

  resources:
    default:
      cpu: 16
      gpu: 2
      memory: 256Gi
      storage: 250Gi

  tasks:
  - name: serve
    image: nvcr.io/nvidian/dreamzero_inference_server:latest
    credentials:
      nvcr-nvidian: {}
    command: ["bash", "-c"]
    args:
    - |
      set -e

      cd /workspace/dreamzero
      CUDA_VISIBLE_DEVICES=0,1 python -m torch.distributed.run \
        --standalone \
        --nproc_per_node=2 \
        socket_test_optimized_AR.py \
        --port {{ port }} \
        --enable-dit-cache \
        --model-path "${MODELS_DIR}/DreamZero-DROID"

    environment:
      NCCL_DEBUG: INFO
      NO_ALBUMENTATIONS_UPDATE: "1"

default-values:
  port: "5000"
