<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
  <div id="diagram"></div>
  <script>
    (async function () {
      mermaid.initialize({ startOnLoad: false });
      var text = await (await fetch("2026_04_24_v3_propsed_timeline.mmd")).text();
      var r = await mermaid.render("v3", text);
      var el = document.getElementById("diagram");
      el.innerHTML = r.svg;
      r.bindFunctions?.(el);
    })();
  </script>
</body>
</html>
